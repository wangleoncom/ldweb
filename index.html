    <style>
        /* ================= 系統全域與 CSS 變數 ================= */
        :root {
            --bg-deep: #030303;
            --liquid-primary: #38bdf8;
            --liquid-secondary: #0284c7;
            --glass-bg: rgba(18, 18, 18, 0.5); 
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-highlight: rgba(255, 255, 255, 0.25);
        }

        html, body {
            background-color: var(--bg-deep) !important;
            color: #f4f4f5;
            font-family: "SF Pro Display", -apple-system, BlinkMacSystemFont, "PingFang TC", sans-serif;
            margin: 0; min-height: 100dvh; overflow-x: hidden; 
            -webkit-tap-highlight-color: transparent;
            scroll-behavior: smooth;
        }

        /* 🔥 AI Markdown 專屬美化樣式 (工程師級別) */
        .markdown-body { color: #d4d4d8; font-size: 15px; line-height: 1.7; }
        .markdown-body p { margin-bottom: 1em; }
        .markdown-body h1, .markdown-body h2, .markdown-body h3 { color: #fff; font-weight: 900; margin-top: 1.5em; margin-bottom: 0.5em; }
        .markdown-body h3 { font-size: 1.1em; color: #38bdf8; }
        .markdown-body ul { list-style-type: disc; padding-left: 1.5em; margin-bottom: 1em; }
        .markdown-body ol { list-style-type: decimal; padding-left: 1.5em; margin-bottom: 1em; }
        .markdown-body li { margin-bottom: 0.25em; }
        .markdown-body strong { color: #fff; font-weight: bold; }
        .markdown-body code:not(pre code) { background: rgba(56, 189, 248, 0.15); color: #7dd3fc; padding: 0.2em 0.4em; border-radius: 6px; font-family: 'Fira Code', monospace; font-size: 0.9em; }
        .markdown-body pre { background: #1e1e1e !important; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 16px; overflow-x: auto; margin-bottom: 1em; box-shadow: inset 0 2px 10px rgba(0,0,0,0.5); }
        .markdown-body pre code { font-family: 'Fira Code', monospace; font-size: 13px; background: transparent; padding: 0; }

        /* ================= 質感藍色液態毛玻璃背景 ================= */
        .liquid-bg-container { position: fixed; inset: 0; z-index: -3; background-color: var(--bg-deep); overflow: hidden; transform: translateZ(0); }
        .ambient-orb { position: absolute; border-radius: 50%; opacity: 0.6; filter: blur(60px); animation: fluidDrift 20s infinite alternate ease-in-out; will-change: transform; }
        .orb-1 { width: 55vw; height: 55vw; top: -10%; left: -10%; background: linear-gradient(135deg, var(--liquid-primary), var(--liquid-secondary)); } 
        .orb-2 { width: 65vw; height: 65vw; bottom: -15%; right: -10%; background: linear-gradient(135deg, #0ea5e9, #0369a1); filter: blur(80px); animation-delay: -5s; animation-direction: alternate-reverse; } 
        .orb-3 { width: 45vw; height: 45vw; top: 30%; left: 25%; background: radial-gradient(circle, rgba(56,189,248,0.6), transparent); filter: blur(70px); animation-duration: 25s; }
        @keyframes fluidDrift { 0% { transform: translate3d(0, 0, 0) scale(1) rotate(0deg); } 50% { transform: translate3d(10vw, 8vh, 0) scale(1.05) rotate(90deg); } 100% { transform: translate3d(-8vw, 12vh, 0) scale(0.95) rotate(180deg); } }

        /* ================= 核心 UI 元件 ================= */
        .premium-card { background: var(--glass-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid var(--glass-border); border-top: 1px solid var(--glass-highlight); border-radius: 32px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255, 255, 255, 0.05); position: relative; overflow: hidden; transition: transform 0.4s ease, box-shadow 0.4s ease, border-color 0.4s ease; }
        .premium-card::before { content: ''; position: absolute; top: 0; left: -150%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.06), transparent); transform: skewX(-25deg); transition: left 0.6s ease; pointer-events: none; }
        .premium-card:hover { transform: translateY(-4px); border-color: rgba(56, 189, 248, 0.4); box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.9), 0 0 25px -10px rgba(56, 189, 248, 0.3); }
        .premium-card:hover::before { left: 150%; }
        .glass-element { background: rgba(255, 255, 255, 0.04); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-top: 1px solid rgba(255, 255, 255, 0.2); box-shadow: 0 8px 20px rgba(0,0,0,0.4); transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .glass-element:hover { background: rgba(255, 255, 255, 0.08); border-color: rgba(56, 189, 248, 0.5); }
        .glass-element:active { transform: scale(0.95); }

        /* ================= 導航列 ================= */
        .nav-dock { background: rgba(12, 12, 12, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-top: 1px solid rgba(255, 255, 255, 0.2); border-radius: 100px; padding: 10px 16px; box-shadow: 0 25px 50px rgba(0,0,0,0.9); }
        .nav-item { color: rgba(255,255,255,0.4); transition: color 0.3s ease, transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); position: relative; }
        .nav-item:hover { color: rgba(255,255,255,0.9); }
        .nav-item.active { color: #38bdf8; transform: translateY(-6px) scale(1.1); filter: drop-shadow(0 0 8px rgba(56,189,248,0.6)); }
        .nav-item.active::after { content: ''; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%); width: 6px; height: 6px; background: #0284c7; border-radius: 50%; box-shadow: 0 0 12px #38bdf8; }
        .nav-item:active { transform: scale(0.85); }

        /* ================= 動畫與實用類 ================= */
        .page { display: none; opacity: 0; }
        .page.active { display: block; animation: smoothReveal 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        @keyframes smoothReveal { 0% { opacity: 0; transform: translate3d(0, 20px, 0) scale(0.98); } 100% { opacity: 1; transform: translate3d(0, 0, 0) scale(1); } }
        
        .text-gradient-blue { 
            background: linear-gradient(135deg, #bae6fd 0%, #38bdf8 50%, #0284c7 100%); 
            -webkit-background-clip: text; 
            background-clip: text;
            -webkit-text-fill-color: transparent; 
        }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .btn-social { position: relative; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); transition: all 0.2s ease; }
        .btn-social:active { transform: scale(0.92); }
        .btn-tiktok { background: rgba(20,20,20,0.8); } .btn-tiktok:hover { border-color: #38bdf8; box-shadow: 0 0 15px rgba(56,189,248,0.3); }
        .btn-ig { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); } .btn-ig:hover { box-shadow: 0 0 15px rgba(220,39,67,0.5); }
        .btn-twitch { background: #9146FF; } .btn-twitch:hover { box-shadow: 0 0 15px rgba(145,70,255,0.5); }
        .btn-discord { background: #5865F2; } .btn-discord:hover { box-shadow: 0 0 15px rgba(88,101,242,0.5); }
        .swal2-popup { background: rgba(18,18,18,0.95) !important; backdrop-filter: blur(20px) !important; border: 1px solid rgba(255,255,255,0.15) !important; border-top: 1px solid rgba(255,255,255,0.3) !important; border-radius: 32px !important; color: #fff !important; }
        @keyframes spin-slow { 100% { transform: rotate(360deg); } }
        .playing-record { animation: spin-slow 4s linear infinite; }
        @keyframes text-glitch { 0% { opacity: 0; transform: translateY(10px); } 20% { opacity: 1; transform: translateY(0); } 80% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-10px); } }
        .boot-text { animation: text-glitch 1.5s ease-in-out infinite; }
        
        /* ================= 成長軌跡 (防跑版置中設計) ================= */
        #timeline-wrapper { position: relative; padding-top: 40px; padding-bottom: 60px; overflow: hidden; }
        .timeline-beam { position: absolute; left: 24px; top: 0; bottom: 0; width: 2px; background: linear-gradient(to bottom, transparent, rgba(56,189,248,0.2) 10%, rgba(56,189,248,0.2) 90%, transparent); z-index: 1; }
        @media (min-width: 768px) { .timeline-beam { left: 50%; transform: translateX(-50%); } }
        .timeline-scanner { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 4px; height: 120px; background: linear-gradient(to bottom, transparent, #fff, #38bdf8, transparent); border-radius: 4px; filter: drop-shadow(0 0 10px #38bdf8) drop-shadow(0 0 20px #0284c7); opacity: 0; z-index: 2; }
        .timeline-item { position: relative; width: 100%; margin-bottom: 3rem; }
        .timeline-dot { position: absolute; left: 24px; top: 50%; transform: translate(-50%, -50%); width: 14px; height: 14px; border-radius: 50%; background: #0a0a0a; border: 2px solid rgba(255,255,255,0.1); transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); z-index: 10; }
        @media (min-width: 768px) { .timeline-dot { left: 50%; } }
        .timeline-node-card { background: rgba(15, 15, 15, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.03); border-top: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; box-shadow: 0 10px 40px -10px rgba(0,0,0,0.8); transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1); transform: translateY(40px) scale(0.96); opacity: 0; padding: 24px; }
        .timeline-item.lit .timeline-dot { background: #fff; border-color: #38bdf8; box-shadow: 0 0 15px 2px rgba(56,189,248,0.8), 0 0 30px rgba(56,189,248,0.4); transform: translate(-50%, -50%) scale(1.3); }
        .timeline-item.lit .timeline-node-card { transform: translateY(0) scale(1); opacity: 1; border-color: rgba(56, 189, 248, 0.2); border-top: 1px solid rgba(56, 189, 248, 0.5); box-shadow: 0 20px 40px -10px rgba(0,0,0,0.9), inset 0 1px 20px rgba(56,189,248,0.05); }
        .timeline-node-card:hover { transform: translateY(-4px) !important; border-color: rgba(56, 189, 248, 0.5) !important; box-shadow: 0 30px 50px -10px rgba(0,0,0,0.9), 0 0 30px rgba(56, 189, 248, 0.15) !important; }
        
        /* 語音按鈕閃爍動畫 */
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        .recording { color: #ef4444 !important; animation: pulse-red 1.5s infinite; }
    </style>
</head>

    <script>
        window.addEventListener('load', () => {
            setTimeout(() => {
                const splash = document.getElementById('splash');
                if(splash) {
                    splash.style.opacity = '0';
                    setTimeout(() => { splash.style.display = 'none'; }, 600);
                }
            }, 800);
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => {
                    console.log('PWA Service Worker 尚未建立或註冊失敗:', err);
                });
            });
        }

        let isBgmPlaying = false;
        function toggleBGM() {
            const audio = document.getElementById('bgm-audio');
            const icon = document.getElementById('bgm-icon');
            const btn = document.getElementById('bgm-btn');
            
            if (!audio) return;

            if (isBgmPlaying) {
                audio.pause();
                icon.className = "fa-solid fa-compact-disc text-lg";
                btn.classList.remove('text-sky-400', 'border-sky-500/50', 'shadow-[0_0_15px_rgba(56,189,248,0.3)]');
                btn.classList.add('text-zinc-400');
            } else {
                audio.volume = 0;
                audio.play().catch(e => console.log('播放被攔截:', e));
                
                let fadeIn = setInterval(() => {
                    if (audio.volume < 0.25) {
                        audio.volume += 0.05;
                    } else {
                        clearInterval(fadeIn);
                    }
                }, 100);

                icon.className = "fa-solid fa-compact-disc text-lg playing-record";
                btn.classList.add('text-sky-400', 'border-sky-500/50', 'shadow-[0_0_15px_rgba(56,189,248,0.3)]');
                btn.classList.remove('text-zinc-400');
            }
            isBgmPlaying = !isBgmPlaying;
        }

        function togglePerfMode() {
            const isPerfMode = document.getElementById('perf-toggle').checked;
            const bgEffects = document.getElementById('bg-effects');
            
            if (isPerfMode) {
                bgEffects.style.display = 'none';
                document.documentElement.style.setProperty('--glass-bg', 'rgba(20, 20, 20, 0.95)');
            } else {
                bgEffects.style.display = 'block';
                document.documentElement.style.setProperty('--glass-bg', 'rgba(18, 18, 18, 0.5)');
            }
        }

        function toggleSettings() {
            const modal = document.getElementById('settings-modal');
            const content = document.getElementById('settings-content');
            if(modal.classList.contains('hidden')) {
                modal.classList.remove('hidden');
                modal.classList.add('flex');
                setTimeout(() => {
                    modal.classList.remove('opacity-0');
                    content.classList.remove('scale-95');
                }, 10);
            } else {
                modal.classList.add('opacity-0');
                content.classList.add('scale-95');
                setTimeout(() => {
                    modal.classList.add('hidden');
                    modal.classList.remove('flex');
                }, 300);
            }
        }

        function triggerAILoading() {
            const overlay = document.getElementById('ai-loading-overlay');
            if(!overlay) return;

            overlay.classList.remove('hidden');
            setTimeout(() => {
                overlay.classList.remove('opacity-0');
                overlay.classList.add('opacity-100');
            }, 10);

            setTimeout(() => {
                overlay.classList.remove('opacity-100');
                overlay.classList.add('opacity-0');
                setTimeout(() => {
                    overlay.classList.add('hidden');
                }, 500);
            }, 2500);
        }

        const observer = new MutationObserver((mutations) => {
            mutations.forEach((mutation) => {
                if (mutation.target.id === 'page-timeline' && mutation.target.classList.contains('active')) {
                    triggerTimelineAnimation();
                }
            });
        });

        window.addEventListener('DOMContentLoaded', () => {
            const timelinePage = document.getElementById('page-timeline');
            if(timelinePage) observer.observe(timelinePage, { attributes: true, attributeFilter: ['class'] });
        });

        function triggerTimelineAnimation() {
            const scanner = document.querySelector('.timeline-scanner');
            const items = document.querySelectorAll('.timeline-item');
            
            if(!scanner) return;

            // 初始狀態重置
            scanner.style.transition = 'none';
            scanner.style.top = '0%';
            items.forEach(item => item.classList.remove('lit'));

            setTimeout(() => {
                const totalItems = items.length;
                const totalDuration = totalItems > 0 ? totalItems * 0.7 : 2; 
                
                // 啟動光線掃描動畫
                scanner.style.transition = `top ${totalDuration}s linear, opacity 0.3s`;
                scanner.style.opacity = '1';
                scanner.style.top = '100%'; 

                // 依序點亮卡片，並跟著光線自動捲動
                for(let i = 0; i < totalItems; i++) {
                    setTimeout(() => { 
                        items[i].classList.add('lit'); 
                        
                        // 🔥 這裡就是自動跟隨捲動的關鍵魔法
                        // 讓剛亮起來的卡片平滑地置中顯示
                        items[i].scrollIntoView({ behavior: 'smooth', block: 'center' });
                        
                    }, 200 + (i * 700)); 
                }

                // 動畫結束後隱藏掃描光線
                setTimeout(() => { 
                    scanner.style.opacity = '0'; 
                }, totalDuration * 1000 + 400);
            }, 100);
        }
    </script>
